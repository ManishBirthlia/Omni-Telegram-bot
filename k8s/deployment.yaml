apiVersion: apps/v1
kind: Deployment
metadata:
  name: kids-toon-bot
  labels:
    app: kids-toon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kids-toon
  template:
    metadata:
      labels:
        app: kids-toon
    spec:
      containers:
        - name: bot
          image: your-registry/kids-toon-ai:latest
          envFrom:
            - secretRef:
                name: kids-toon-env
          ports:
            - containerPort: 80
          command: ["python", "-m", "bot.main"]
---
apiVersion: v1
kind: Service
metadata:
  name: kids-toon-service
spec:
  selector:
    app: kids-toon
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
