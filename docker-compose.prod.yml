version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kidstoon
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    image: kids-toon-ai:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    command: python -m bot.main

  celery-worker:
    image: kids-toon-ai:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    command: celery -A workers.celery_app worker -Q intelligence,generation,assembly,upload --concurrency=4

volumes:
  pgdata:
