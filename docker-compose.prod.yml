services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: omni_telegram_bot
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d omni_telegram_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  bot:
    image: omni-telegram-bot:latest
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - downloads-yt:/app/Youtube Downloads
      - downloads-ig:/app/Instagram Downloads
      - generated-images:/app/Generated Images
    command: python -m bot.main
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  celery-worker:
    image: omni-telegram-bot:latest
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - downloads-yt:/app/Youtube Downloads
      - downloads-ig:/app/Instagram Downloads
      - generated-images:/app/Generated Images
    command: celery -A workers.celery_app worker -Q intelligence,generation,assembly,upload --concurrency=4
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

volumes:
  pgdata:
  downloads-yt:
  downloads-ig:
  generated-images:
